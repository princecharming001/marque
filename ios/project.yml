name: Marque
options:
  bundleIdPrefix: com.marque
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
packages:
  # Siri-style animated orb (MIT) — drives the voice visual; wrapped by VoiceOrb.swift.
  # Pinned to an exact revision (repo only tags 0.x) for reproducible builds.
  Orb:
    url: https://github.com/metasidd/Orb
    revision: a48fc3382ad40905ca4aa9691c6b504004740ad1
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
schemes:
  Marque:
    build:
      targets:
        Marque: all
    run:
      config: Debug
      # Local StoreKit testing: real purchase/restore flows in the simulator.
      storeKitConfiguration: Marque.storekit
targets:
  Marque:
    type: application
    platform: iOS
    sources:
      - path: Marque
    dependencies:
      - package: Orb
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.marque.app
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Marque/Info.plist
      properties:
        CFBundleDisplayName: Marque
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Marque records talking-head video so the AI can edit it into clips."
        NSMicrophoneUsageDescription: "Marque records audio with your video so your clips have sound."
        NSPhotoLibraryUsageDescription: "Marque imports existing videos to repurpose into clips."
        NSSpeechRecognitionUsageDescription: "Marque transcribes what you say to the voice assistant so it can build your content."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIAppFonts:
          - Inter-400.ttf
          - Inter-500.ttf
          - Inter-600.ttf
          - Inter-700.ttf
          - PlayfairDisplay.ttf
          - PlayfairDisplay-Italic.ttf
          - Matter-Light.ttf
          - Matter-Regular.ttf
          - Matter-Medium.ttf
          - Matter-SemiBold.ttf
          - Matter-Bold.ttf
          - Fraunces-Regular.ttf
          - Fraunces-Italic.ttf
