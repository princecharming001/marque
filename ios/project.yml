name: Marque
options:
  bundleIdPrefix: com.marque
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    GENERATE_INFOPLIST_FILE: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Marque:
    type: application
    platform: iOS
    sources:
      - path: Marque
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.marque.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: Marque
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "Marque records talking-head video so the AI can edit it into clips."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Marque records audio with your video so your clips have sound."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Marque imports existing videos to repurpose into clips."
