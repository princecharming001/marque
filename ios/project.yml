name: Marque
options:
  bundleIdPrefix: com.getmarque
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "12"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    # Real signing (was CODE_SIGNING_ALLOWED: NO — sim-only). Automatic style lets
    # xcodebuild -allowProvisioningUpdates manage certs/profiles via the ASC API key,
    # no interactive Apple ID login needed. Harmless for Debug/simulator builds too.
    DEVELOPMENT_TEAM: 3TJ8RC3JCX
    CODE_SIGN_STYLE: Automatic
  configs:
    Release:
      # Manual + an explicit profile, rather than Automatic — xcodebuild's automatic
      # signing resolution was trying to create a Development profile (needs registered
      # devices) instead of Distribution when run headlessly via -allowProvisioningUpdates.
      # This Distribution cert + profile were created directly via the ASC API instead.
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "iPhone Distribution"
      PROVISIONING_PROFILE_SPECIFIER: "Marque App Store"
      DEVELOPMENT_TEAM: 3TJ8RC3JCX
schemes:
  Marque:
    build:
      targets:
        Marque: all
    run:
      config: Debug
      # Local StoreKit testing: real purchase/restore flows in the simulator.
      storeKitConfiguration: Marque.storekit
targets:
  Marque:
    type: application
    platform: iOS
    sources:
      - path: Marque
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.getmarque.app
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        # Target-level (not just project-level) so it definitively wins — Xcode was
        # picking up a stray project-level "iPhone Developer" default over the
        # project-level Release override above.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "iPhone Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Marque App Store"
          DEVELOPMENT_TEAM: 3TJ8RC3JCX
          # ⚠️ REMOVE MOCK_PAYWALL BEFORE APP REVIEW — lets "Start my week free"
          # mock-subscribe on TestFlight while no ASC IAP products exist yet.
          # (Only fires on the empty-products branch in Billing.purchase().)
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) MOCK_PAYWALL"
    entitlements:
      path: Marque/Marque.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
    info:
      path: Marque/Info.plist
      properties:
        CFBundleDisplayName: Yunicorn
        CFBundleIconName: AppIcon
        CFBundleVersion: "12"
        MARQUE_BACKEND_URL: https://marque-api.onrender.com
        # Supabase auth (anon key is client-shippable by design). Without these,
        # TestFlight builds silently run demo-mode auth.
        SUPABASE_URL: https://nxibeiykcgxpbmkeadth.supabase.co
        SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54aWJlaXlrY2d4cGJta2VhZHRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU1MjA4MDcsImV4cCI6MjA4MTA5NjgwN30.0ViO1YkTQ2CEVjf1VoBun6cgVodu2u3DrcDipeWnr28
        # URL scheme for the Google OAuth callback (ASWebAuthenticationSession).
        CFBundleURLTypes:
          - CFBundleURLName: com.getmarque.app.auth
            CFBundleURLSchemes: [marque]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Yunicorn records talking-head video so the AI can edit it into clips."
        NSMicrophoneUsageDescription: "Yunicorn records audio with your video so your clips have sound."
        NSPhotoLibraryUsageDescription: "Yunicorn imports existing videos to repurpose into clips."
        NSSpeechRecognitionUsageDescription: "Yunicorn transcribes what you say to the voice assistant so it can build your content."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIAppFonts:
          - Inter-400.ttf
          - Inter-500.ttf
          - Inter-600.ttf
          - Inter-700.ttf
          - PlayfairDisplay.ttf
          - PlayfairDisplay-Italic.ttf
          - Matter-Light.ttf
          - Matter-Regular.ttf
          - Matter-Medium.ttf
          - Matter-SemiBold.ttf
          - Matter-Bold.ttf
          - Fraunces-Regular.ttf
          - Fraunces-Italic.ttf
