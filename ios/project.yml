name: Marque
options:
  bundleIdPrefix: com.getmarque
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    # Real signing (was CODE_SIGNING_ALLOWED: NO — sim-only). Automatic style lets
    # xcodebuild -allowProvisioningUpdates manage certs/profiles via the ASC API key,
    # no interactive Apple ID login needed. Harmless for Debug/simulator builds too.
    DEVELOPMENT_TEAM: 3TJ8RC3JCX
    CODE_SIGN_STYLE: Automatic
  configs:
    Release:
      # Manual + an explicit profile, rather than Automatic — xcodebuild's automatic
      # signing resolution was trying to create a Development profile (needs registered
      # devices) instead of Distribution when run headlessly via -allowProvisioningUpdates.
      # This Distribution cert + profile were created directly via the ASC API instead.
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "iPhone Distribution"
      PROVISIONING_PROFILE_SPECIFIER: "Marque App Store"
      DEVELOPMENT_TEAM: 3TJ8RC3JCX
schemes:
  Marque:
    build:
      targets:
        Marque: all
    run:
      config: Debug
      # Local StoreKit testing: real purchase/restore flows in the simulator.
      storeKitConfiguration: Marque.storekit
targets:
  Marque:
    type: application
    platform: iOS
    sources:
      - path: Marque
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.getmarque.app
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        # Target-level (not just project-level) so it definitively wins — Xcode was
        # picking up a stray project-level "iPhone Developer" default over the
        # project-level Release override above.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "iPhone Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Marque App Store"
          DEVELOPMENT_TEAM: 3TJ8RC3JCX
    info:
      path: Marque/Info.plist
      properties:
        CFBundleDisplayName: Marque
        CFBundleIconName: AppIcon
        MARQUE_BACKEND_URL: https://marque-api.onrender.com
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Marque records talking-head video so the AI can edit it into clips."
        NSMicrophoneUsageDescription: "Marque records audio with your video so your clips have sound."
        NSPhotoLibraryUsageDescription: "Marque imports existing videos to repurpose into clips."
        NSSpeechRecognitionUsageDescription: "Marque transcribes what you say to the voice assistant so it can build your content."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIAppFonts:
          - Inter-400.ttf
          - Inter-500.ttf
          - Inter-600.ttf
          - Inter-700.ttf
          - PlayfairDisplay.ttf
          - PlayfairDisplay-Italic.ttf
          - Matter-Light.ttf
          - Matter-Regular.ttf
          - Matter-Medium.ttf
          - Matter-SemiBold.ttf
          - Matter-Bold.ttf
          - Fraunces-Regular.ttf
          - Fraunces-Italic.ttf
