name: Marque
options:
  bundleIdPrefix: com.marque
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Marque:
    type: application
    platform: iOS
    sources:
      - path: Marque
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.marque.app
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Marque/Info.plist
      properties:
        CFBundleDisplayName: Marque
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Marque records talking-head video so the AI can edit it into clips."
        NSMicrophoneUsageDescription: "Marque records audio with your video so your clips have sound."
        NSPhotoLibraryUsageDescription: "Marque imports existing videos to repurpose into clips."
        UIAppFonts:
          - Inter-400.ttf
          - Inter-500.ttf
          - Inter-600.ttf
          - Inter-700.ttf
          - PlayfairDisplay.ttf
          - PlayfairDisplay-Italic.ttf
