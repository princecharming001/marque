appId: com.getmarque.app
name: R6 editor — reorder button, placeholder playback, caption track
---
- launchApp:
    arguments:
      demoClip: 1
      backend.url: "http://127.0.0.1:8001"
- tapOn: { id: "tour.skip", optional: true }
- tapOn: "Library"
- tapOn: { id: "library.clip", index: 0 }
- tapOn: { id: "clip.editManual" }
- extendedWaitUntil:
    visible: { id: "editorPro.playPause" }
    timeout: 12000
- takeScreenshot: /tmp/r6-ed-01-open
# placeholder playback: timeReadout should advance
- tapOn: { id: "editorPro.playPause" }
- takeScreenshot: /tmp/r6-ed-02-playing
# select a clip → Move ▶ appears
- tapOn: { id: "editorPro.clip.0" }
- extendedWaitUntil:
    visible: { id: "editorPro.moveRight" }
    timeout: 4000
- tapOn: { id: "editorPro.moveRight" }
- takeScreenshot: /tmp/r6-ed-03-reordered
# One-bar model: pop the clip selection so the root tiles are back.
- tapOn: { id: "editorPro.ctx.back" }
# caption track (phrase clips on the timeline; word strip retired)
- tapOn: { id: "editorPro.root.captions" }
- extendedWaitUntil:
    visible: { id: "editorPro.captionLane" }
    timeout: 4000
- tapOn: { id: "editorPro.editCaptions" }
- tapOn: { id: "editorPro.captionRow.0" }
- extendedWaitUntil:
    visible: "Edit caption"
    timeout: 4000
- takeScreenshot: /tmp/r6-ed-04-phraseedit
- tapOn: { id: "dialog.cancel" }
- tapOn: { id: "editorPro.captionList.done" }
