appId: com.marque.app
name: Marque — connect & verify a real account
---
- launchApp:
    arguments:
      reset: "true"
- tapOn:
    id: "onboard.start"
- tapOn: "Grow my audience"
- tapOn: "Continue"
- tapOn:
    id: "onboard.niche"
- inputText: "strength training"
- tapOn:
    point: "50%,12%"
- tapOn: "Continue"
- tapOn:
    id: "onboard.knownFor"
- inputText: "time-efficient workouts"
- tapOn:
    point: "50%,12%"
- tapOn: "Continue"
- assertVisible: "How do you sound?"
- tapOn: "Continue"
- assertVisible: "What kind of videos?"
- tapOn: "Talking-head"
- tapOn: "Continue"
- assertVisible: "Connect your accounts"
# Link a real TikTok account and verify it comes back with a follower count + avatar
- tapOn:
    id: "connect.tiktok"
- tapOn:
    id: "connect.handle"
- inputText: "mrbeast"
- tapOn:
    point: "50%,12%"
- tapOn:
    id: "connect.link"
- extendedWaitUntil:
    visible:
      id: "connect.linked"
    timeout: 25000
- takeScreenshot: /Users/home/Marque/.shots/connect-verified
