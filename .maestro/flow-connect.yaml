appId: com.getmarque.app
name: Marque — connect & verify a real account (via the connectAccounts step)
---
- launchApp:
    arguments:
      reset: "true"
- tapOn:
    id: "onboard.start"

# Fast-path the quiz up to the voice-teach step.
- tapOn:
    id: "onboard.goal.audience"
- extendedWaitUntil:
    visible: "What gets in the way most?"
    timeout: 4000
- tapOn:
    id: "onboard.blocker.time"
- extendedWaitUntil:
    visible: "How often do you post right now?"
    timeout: 4000
- tapOn:
    id: "onboard.frequency.sometimes"
- extendedWaitUntil:
    visible: "Consistency beats virality"
    timeout: 4000
- tapOn:
    id: "onboard.continue"
- tapOn:
    id: "onboard.creatorName"
- inputText: "Alex"
- tapOn:
    id: "onboard.nameContinue"
- tapOn:
    id: "onboard.niche"
- inputText: "strength training"
- tapOn:
    id: "onboard.nicheContinue"
- tapOn:
    id: "onboard.whatYouDo"
- inputText: "time-efficient workouts"
- tapOn:
    id: "onboard.audience"
- inputText: "busy lifters"
- tapOn:
    id: "onboard.aboutContinue"
- tapOn:
    id: "onboard.knownForSkip"
- tapOn:
    id: "onboard.platform.tiktok"

# connectAccounts step: link a real TikTok account and verify it comes back
# with a follower count + avatar.
- extendedWaitUntil:
    visible: "Connect your accounts"
    timeout: 4000
- tapOn:
    id: "connect.tiktok"
- tapOn:
    id: "connect.handle"
- inputText: "mrbeast"
- tapOn:
    point: "50%,12%"
- tapOn:
    id: "connect.link"
- extendedWaitUntil:
    visible:
      id: "connect.linked"
    timeout: 25000
- takeScreenshot: /Users/home/Marque/.shots/connect-verified
