appId: com.getmarque.app
name: R10 — CapCut mimicry (transport, filter cards, keywords, cleanup, fullscreen)
---
- launchApp:
    arguments:
      demoClip: 1
      backend.url: "http://127.0.0.1:8001"
- tapOn: { id: "tour.skip", optional: true }
- tapOn: "Library"
- tapOn: { id: "library.clip", index: 0 }
- tapOn: { id: "clip.editManual" }
- extendedWaitUntil:
    visible: { id: "editorPro.playPause" }
    timeout: 12000
- tapOn: { id: "editorPro.coachDismiss", optional: true }
# TRANSPORT: play/undo/redo/fullscreen live in the strip
- assertVisible: { id: "editorPro.fullscreen" }
- assertVisible: { id: "editorPro.undo" }
- takeScreenshot: /tmp/cc-01-transport
# FILTER CARDS: visual thumbnails + intensity slider
- tapOn: { id: "editorPro.root.filters" }
- extendedWaitUntil:
    visible: { id: "editorPro.filterCards" }
    timeout: 4000
- tapOn: { id: "editorPro.filter.film" }
- extendedWaitUntil:
    visible: { id: "editorPro.filterIntensity" }
    timeout: 4000
- takeScreenshot: /tmp/cc-02-filter-cards
# KEYWORD HIGHLIGHT: Text mode → Customize (reveal fine-tune row) → Keywords toggle
- tapOn: { id: "editorPro.root.captions" }
- tapOn: { id: "editorPro.capCustomize" }
- extendedWaitUntil:
    visible: { id: "editorPro.capKeywords" }
    timeout: 4000
- tapOn: { id: "editorPro.capKeywords" }
- takeScreenshot: /tmp/cc-03-keywords
# CLEANUP: Edit mode → transcript-driven filler/pause bulk cut
# Clean up is a ROOT tile now (one-bar model) — no mode switch needed.
- tapOn: { id: "editorPro.cleanup" }
- extendedWaitUntil:
    visible: { id: "editorPro.cleanupPanel" }
    timeout: 4000
# Formatting fix #10 regression guard: the demo clip's deterministic mock transcript
# (backend/main.py _mock_words over _synthesize_demo_clip_job's script) contains exactly
# one filler-listed word — "actually", mid-sentence in "...the one system that actually
# works..." with no pause before it. The old cleanup logic cut every listed word
# unconditionally and would have flagged it; the fixed clause-boundary rule must not, so
# the panel shows its empty state instead of a checkbox row for "actually".
- assertVisible: "Nothing to clean up"
- assertNotVisible: "“actually”"
- takeScreenshot: /tmp/cc-04-cleanup
# dismiss the panel (Button ids aren't tappable in Maestro; the static text is)
- tapOn: "Cancel"
- extendedWaitUntil:
    visible: { id: "editorPro.playPause" }
    timeout: 4000
# FULLSCREEN: transport ⛶ opens a full preview, X closes it
- tapOn: { id: "editorPro.fullscreen" }
- extendedWaitUntil:
    visible: { id: "editorPro.fullscreen.close" }
    timeout: 4000
- takeScreenshot: /tmp/cc-05-fullscreen
- tapOn: { id: "editorPro.fullscreen.close" }
- extendedWaitUntil:
    visible: { id: "editorPro.playPause" }
    timeout: 4000
- takeScreenshot: /tmp/cc-06-back
