appId: com.getmarque.app
name: Overlay chip lane — visible, selectable, deletable
---
- launchApp:
    arguments: { demoClip: 1, backend.url: "http://127.0.0.1:8001" }
- tapOn: { id: "tour.skip", optional: true }
- tapOn: "Library"
- tapOn: { id: "library.clip", index: 0 }
- tapOn: { id: "clip.editManual" }
- extendedWaitUntil:
    visible: { id: "editorPro.playPause" }
    timeout: 12000
- tapOn: { id: "editorPro.coachDismiss", optional: true }
# the demo EDL seeds a punch_in (frames 90-150) → chip must be visible
- extendedWaitUntil:
    visible: { id: "editorPro.overlay.0" }
    timeout: 5000
- takeScreenshot: /tmp/r6-lane-01-chip
# tap the chip → overlay tools appear (Delete + zoom label)
- tapOn: { id: "editorPro.overlay.0" }
- extendedWaitUntil:
    visible: { id: "editorPro.ctx.deleteOverlay" }
    timeout: 4000
- takeScreenshot: /tmp/r6-lane-02-selected
# delete it → chip gone, Save enabled
- tapOn: { id: "editorPro.ctx.deleteOverlay" }
- assertNotVisible: { id: "editorPro.overlay.0" }
- takeScreenshot: /tmp/r6-lane-03-deleted
# undo brings it back
- tapOn: { id: "editorPro.undo" }
- extendedWaitUntil:
    visible: { id: "editorPro.overlay.0" }
    timeout: 4000
- takeScreenshot: /tmp/r6-lane-04-undone
