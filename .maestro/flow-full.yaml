appId: com.marque.app
name: Marque — full core loop
---
- launchApp:
    arguments:
      reset: "true"
- assertVisible: "Get started"

# Onboarding — step 0: landing
- tapOn:
    id: "onboard.start"

# Step 1: Mascot self-intro
- assertVisible: "Hi, I’m Marque"
- tapOn:
    id: "onboard.mascotIntro.continue"

# Step 2: Collect creator name
- assertVisible: "…and who are you?"
- tapOn:
    id: "onboard.creatorName"
- inputText: "Alex"
- tapOn:
    id: "onboard.nameContinue"

# Step 3: Mascot greets by name
- assertVisible: "Let’s get to know each other, Alex!"
- tapOn:
    id: "onboard.mascotReady.continue"

# Step 4: Feature explainer
- assertVisible: "I learn what works for you."
- tapOn:
    id: "onboard.featureExplainer.continue"

# Step 5: Goal
- assertVisible: "What are you here to do?"
- tapOn: "Grow my audience"
- tapOn: "Next"

# Step 6: Platform
- assertVisible: "Where does your audience live?"
- tapOn:
    id: "onboard.platform.instagram"
- tapOn: "Next"

# Step 7: Stage
- assertVisible: "Where’s your audience today?"
- tapOn:
    id: "onboard.stage.nano"
- tapOn: "Next"

# Step 8: Frequency
- assertVisible: "How often do you post right now?"
- tapOn:
    id: "onboard.frequency.sometimes"
- tapOn: "Next"

# Step 9: Interstitial
- tapOn:
    id: "onboard.continue"

# Step 10: Blocker
- assertVisible: "What gets in the way most?"
- tapOn:
    id: "onboard.blocker.time"
- tapOn: "Next"

# Step 11: Niche
- assertVisible: "What’s your niche?"
- tapOn:
    id: "onboard.niche"
- inputText: "Fitness coaching"
- tapOn:
    id: "onboard.nicheContinue"

# Step 12: What You Do + Audience
- assertVisible: "Tell me about you"
- tapOn:
    id: "onboard.whatYouDo"
- inputText: "I coach busy professionals"
- tapOn:
    id: "onboard.audience"
- inputText: "busy professionals"
- tapOn:
    id: "onboard.aboutContinue"

# Step 13: Known For
- assertVisible: "What do you want to be known for?"
- tapOn:
    id: "onboard.knownFor"
- inputText: "no-nonsense fitness for busy people"
- tapOn:
    id: "onboard.knownForContinue"

# Step 14: Mirror interstitial
- tapOn:
    id: "onboard.continue"

# Step 15: Voice
- assertVisible: "What’s your voice like?"
- tapOn: "Next"

# Step 16: Camera comfort
- assertVisible: "How do you feel on camera?"
- tapOn:
    id: "onboard.comfort.natural"
- tapOn: "Next"

# Step 17: Styles — "Natural" camera comfort (previous step) already pre-seeds
# preferredStyles=[talkingHead], so Talking-head arrives pre-selected; tapping it
# would TOGGLE IT OFF and leave Continue disabled. Just confirm and move on.
- assertVisible: "What kind of videos?"
- tapOn: "Next"

# Step 18: Pace
- assertVisible: "Pick your weekly pace"
- tapOn:
    id: "onboard.pace.5"
- tapOn: "Next"

# Step 19: Connect
- assertVisible: "Connect your accounts"
- tapOn: "Skip for now"

# AHA — AI generated the first scripts (live Claude/Opus writes 3 rich scripts; allow time)
- extendedWaitUntil:
    visible: "Enter Marque"
    timeout: 90000
- takeScreenshot: /Users/home/Marque/.shots/live-aha
- tapOn:
    id: "onboard.finish"

# Gate 1: account wall (demo path in keyless dev)
- extendedWaitUntil:
    visible:
      id: "auth.demoContinue"
    timeout: 6000
- tapOn:
    id: "auth.demoContinue"

# Gate 2: hard subscription wall (dev bypass in DEBUG builds). The tap is optional:
# a real/leftover StoreKit entitlement in the simulator legitimately skips this
# screen entirely (correct product behavior for an already-subscribed device).
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "paywall.devContinue"
    optional: true

# Into the app — Home with the voice bubble
- extendedWaitUntil:
    visible:
      id: "home.voiceBubble"
    timeout: 6000
- takeScreenshot: /Users/home/Marque/.shots/v3-home

# Film flow: FAB → readied script (seeded by onboarding) → reader → record
- tapOn:
    id: "film.open"
- extendedWaitUntil:
    visible:
      id: "film.readied"
    timeout: 6000
- takeScreenshot: /Users/home/Marque/.shots/v3-film-queue
- tapOn:
    id: "film.readied"
    index: 0
- assertVisible: "Shot plan"
- tapOn:
    id: "script.record"
- extendedWaitUntil:
    visible:
      id: "record.capture"
    timeout: 6000
- assertVisible:
    id: "record.upload"
- tapOn:
    id: "record.capture"
- extendedWaitUntil:
    visible:
      id: "record.makeClips"
    timeout: 8000
- tapOn:
    id: "record.makeClips"

# Session celebration (streak), then clips in Library
- extendedWaitUntil:
    visible:
      id: "celebration.dismiss"
    timeout: 14000
- tapOn:
    id: "celebration.dismiss"
- tapOn: "Library"
- extendedWaitUntil:
    visible: "YOUR CREATIVE VAULT"
    timeout: 6000
- takeScreenshot: /Users/home/Marque/.shots/flow-library

# Performance tab: queue + 30-day insights
- tapOn: "Performance"
- extendedWaitUntil:
    visible: "Coming up"
    timeout: 6000
- takeScreenshot: /Users/home/Marque/.shots/v3-performance

# Chat tab reachable
- tapOn: "Chat"
- extendedWaitUntil:
    visible: "What can I help with?"
    timeout: 6000
