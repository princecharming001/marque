appId: com.getmarque.app
name: Marque — full core loop
---
- launchApp:
    arguments:
      reset: "true"

# Landing (cream, unicorn hero)
- assertVisible: "Get started"
- tapOn:
    id: "onboard.start"

# Pain cluster — single-select MCQs AUTO-ADVANCE (no "Next" taps).
- assertVisible: "What are you here to do?"
- tapOn:
    id: "onboard.goal.audience"
- extendedWaitUntil:
    visible: "What gets in the way most?"
    timeout: 4000
- tapOn:
    id: "onboard.blocker.time"
- extendedWaitUntil:
    visible: "How often do you post right now?"
    timeout: 4000
- tapOn:
    id: "onboard.frequency.sometimes"

# Interstitial A — the method
- extendedWaitUntil:
    visible: "Consistency beats virality"
    timeout: 4000
- tapOn:
    id: "onboard.continue"

# Identity cluster (freeform, Continue pills)
- assertVisible: "What should I call you?"
- tapOn:
    id: "onboard.creatorName"
- inputText: "Alex"
- tapOn:
    id: "onboard.nameContinue"

- assertVisible: "What's your niche?"
- tapOn:
    id: "onboard.niche"
- inputText: "Fitness coaching"
- tapOn:
    id: "onboard.nicheContinue"

- assertVisible: "Tell me about you"
- tapOn:
    id: "onboard.whatYouDo"
- inputText: "I coach busy professionals"
- tapOn:
    id: "onboard.audience"
- inputText: "busy professionals"
- tapOn:
    id: "onboard.aboutContinue"

- assertVisible: "What do you want to be known for?"
- tapOn:
    id: "onboard.knownFor"
- inputText: "no-nonsense fitness for busy people"
- tapOn:
    id: "onboard.knownForContinue"

# Platform (auto-advance)
- assertVisible: "Where does your audience live?"
- tapOn:
    id: "onboard.platform.instagram"

# Connect accounts + voice interview — now two consecutive steps; fast path = skip both
- extendedWaitUntil:
    visible: "Connect your accounts"
    timeout: 4000
- tapOn:
    id: "onboard.connect.skip"

- extendedWaitUntil:
    visible: "A few quick questions"
    timeout: 4000
- tapOn:
    id: "onboard.interview.skip"

# Voice sliders
- assertVisible: "Fine-tune your voice"
- tapOn:
    id: "onboard.voiceContinue"

# Emulate creators (multi-select; fast path = skip)
- extendedWaitUntil:
    visible: "Who do you want to sound like?"
    timeout: 4000
- tapOn:
    id: "onboard.emulate.skip"

# Camera comfort (auto-advance; Natural pre-seeds talking-head)
- assertVisible: "How do you feel on camera?"
- tapOn:
    id: "onboard.comfort.natural"

# Styles — talking-head arrives PRE-SELECTED from comfort seeding; tapping it
# would toggle it OFF and disable Continue. Just continue.
- extendedWaitUntil:
    visible: "Pick your video styles"
    timeout: 4000
- tapOn:
    id: "onboard.stylesContinue"

# Pace (auto-advance)
- assertVisible: "Pick your weekly pace"
- tapOn:
    id: "onboard.pace.5"

# Interstitial B — brand mirror → kick the digest
- extendedWaitUntil:
    visible: "Your brand, in a sentence"
    timeout: 4000
- tapOn:
    id: "onboard.buildPlan"

# Non-blocking aha: staged build screen → ready (live Claude writes 3 scripts; allow time)
- extendedWaitUntil:
    visible: "Enter Marque"
    timeout: 120000
- takeScreenshot: /Users/home/Marque/.shots/live-aha
- tapOn:
    id: "onboard.finish"

# Gate 1 (REORDERED): hard subscription wall first. The tap is optional:
# a real/leftover StoreKit entitlement in the simulator legitimately skips
# this screen entirely.
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "paywall.devContinue"
    optional: true

# Gate 2: account wall (demo path in dev builds)
- extendedWaitUntil:
    visible:
      id: "auth.demoContinue"
    timeout: 6000
- tapOn:
    id: "auth.demoContinue"

# Into the app — Home with the voice bubble
- extendedWaitUntil:
    visible:
      id: "home.voiceBubble"
    timeout: 6000
- takeScreenshot: /Users/home/Marque/.shots/v3-home

# Film flow: FAB → readied script (seeded by onboarding) → reader → record
- tapOn:
    id: "film.open"
- extendedWaitUntil:
    visible:
      id: "film.readied"
    timeout: 6000
- takeScreenshot: /Users/home/Marque/.shots/v3-film-queue
- tapOn:
    id: "film.readied"
    index: 0
- assertVisible: "Shot plan"
- tapOn:
    id: "script.record"
- extendedWaitUntil:
    visible:
      id: "record.capture"
    timeout: 6000
- assertVisible:
    id: "record.upload"
- tapOn:
    id: "record.capture"
- extendedWaitUntil:
    visible:
      id: "record.makeClips"
    timeout: 8000
- tapOn:
    id: "record.makeClips"

# Session celebration (streak), then clips in Library
- extendedWaitUntil:
    visible:
      id: "celebration.dismiss"
    timeout: 14000
- tapOn:
    id: "celebration.dismiss"
- tapOn: "Library"
- extendedWaitUntil:
    visible: "YOUR CREATIVE VAULT"
    timeout: 6000
- takeScreenshot: /Users/home/Marque/.shots/flow-library

# Performance tab: queue + 30-day insights
- tapOn: "Performance"
- extendedWaitUntil:
    visible: "Coming up"
    timeout: 6000
- takeScreenshot: /Users/home/Marque/.shots/v3-performance

# Chat tab reachable
- tapOn: "Chat"
- extendedWaitUntil:
    visible: "What can I help with?"
    timeout: 6000
