appId: com.marque.app
name: Marque — full core loop
---
- launchApp:
    arguments:
      reset: "true"
- assertVisible: "Marque"

# Onboarding — step 0: hero
- tapOn:
    id: "onboard.start"

# Step 1: Goal
- assertVisible: "What are you here to do?"
- tapOn: "Grow my audience"
- tapOn: "Continue"

# Step 2: Platform
- assertVisible: "Where does your audience live?"
- tapOn:
    id: "onboard.platform.instagram"
- tapOn: "Continue"

# Step 3: Stage
- assertVisible: "Where's your audience today?"
- tapOn:
    id: "onboard.stage.nano"
- tapOn: "Continue"

# Step 4: Frequency
- assertVisible: "How often do you post right now?"
- tapOn:
    id: "onboard.frequency.sometimes"
- tapOn: "Continue"

# Step 5: Interstitial
- tapOn:
    id: "onboard.continue"

# Step 6: Blocker
- assertVisible: "What gets in the way most?"
- tapOn:
    id: "onboard.blocker.time"
- tapOn: "Continue"

# Step 7: Niche
- assertVisible: "Tell me about your niche"
- tapOn:
    id: "onboard.niche"
- inputText: "Fitness coaching"
- tapOn: "Continue"

# Step 8: What You Do + Audience
- assertVisible: "Tell me about you"
- tapOn:
    id: "onboard.whatYouDo"
- inputText: "I coach busy professionals"
- tapOn:
    id: "onboard.audience"
- inputText: "busy professionals"
- tapOn: "Continue"

# Step 9: Known For
- assertVisible: "What do you want to be known for?"
- tapOn:
    id: "onboard.knownFor"
- inputText: "no-nonsense fitness for busy people"
- tapOn: "Continue"

# Step 10: Mirror interstitial
- tapOn:
    id: "onboard.continue"

# Step 11: Voice
- assertVisible: "What's your voice like?"
- tapOn: "Continue"

# Step 12: Camera comfort
- assertVisible: "How do you feel on camera?"
- tapOn:
    id: "onboard.comfort.natural"
- tapOn: "Continue"

# Step 13: Styles
- assertVisible: "What kind of videos?"
- tapOn: "Talking-head"
- tapOn: "Continue"

# Step 14: Pace
- assertVisible: "Pick your weekly pace"
- tapOn:
    id: "onboard.pace.5"
- tapOn: "Continue"

# Step 15: Connect
- assertVisible: "Connect your accounts"
- tapOn: "Skip for now"

# AHA — AI generated the first scripts (live Claude/Opus writes 3 rich scripts; allow time)
- extendedWaitUntil:
    visible: "Enter Marque"
    timeout: 90000
- takeScreenshot: /Users/home/Marque/.shots/live-aha
- tapOn:
    id: "onboard.finish"

# Into the app
- assertVisible: "Today"
- tapOn: "Studio"
- assertVisible: "Your pillars"
- assertVisible: "Ready to record"
- takeScreenshot: /Users/home/Marque/.shots/live-studio

# Script reader → Hook Lab → record
- tapOn:
    id: "studio.scriptRow"
- tapOn:
    id: "studio.openScript"
- assertVisible: "Shot plan"
- tapOn:
    id: "script.record"
- extendedWaitUntil:
    visible:
      id: "record.capture"
    timeout: 6000
- assertVisible:
    id: "record.upload"
- tapOn:
    id: "record.capture"
- extendedWaitUntil:
    visible:
      id: "record.makeClips"
    timeout: 8000
- tapOn:
    id: "record.makeClips"

# Session celebration (streak), then clips in Library
- extendedWaitUntil:
    visible:
      id: "celebration.dismiss"
    timeout: 14000
- tapOn:
    id: "celebration.dismiss"
- extendedWaitUntil:
    visible: "Library"
    timeout: 6000
- takeScreenshot: /Users/home/Marque/.shots/flow-library

# Schedule a clip onto the week (Queue tab, was Calendar)
- tapOn: "Queue"
- takeScreenshot: /Users/home/Marque/.shots/after-queue-tap
- extendedWaitUntil:
    visible: "Schedule a clip"
    timeout: 6000

# Coach via You tab → Performance row
- tapOn: "You"
- assertVisible: "Performance"
- tapOn: "Performance"
- extendedWaitUntil:
    visible: "Trending in your niche"
    timeout: 6000
- takeScreenshot: /Users/home/Marque/.shots/flow-coach
