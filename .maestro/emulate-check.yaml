appId: com.getmarque.app
name: emulate icons check
---
- launchApp:
    arguments:
      reset: "true"
- tapOn: { id: "onboard.start" }
- tapOn: { id: "onboard.goal.audience" }
- extendedWaitUntil: { visible: "What gets in the way most?", timeout: 4000 }
- tapOn: { id: "onboard.blocker.time" }
- extendedWaitUntil: { visible: "Why now?", timeout: 4000 }
- tapOn: { id: "onboard.whyNow.serious" }
- extendedWaitUntil: { visible: "How often do you post right now?", timeout: 4000 }
- tapOn: { id: "onboard.frequency.sometimes" }
- extendedWaitUntil: { visible: "Consistency beats virality", timeout: 4000 }
- tapOn: { id: "onboard.continue" }
- extendedWaitUntil: { visible: "Connect your accounts", timeout: 4000 }
- tapOn: { id: "onboard.connect.skip" }
- tapOn: { id: "onboard.creatorName" }
- inputText: "Alex"
- tapOn: { id: "onboard.nameContinue" }
- extendedWaitUntil: { visible: "Where are you today?", timeout: 4000 }
- tapOn: { id: "onboard.stage.micro" }
- tapOn: { id: "onboard.niche" }
- inputText: "Fitness coaching"
- tapOn: { id: "onboard.nicheContinue" }
- tapOn: { id: "onboard.whatYouDo" }
- inputText: "I coach busy professionals"
- tapOn: { id: "onboard.audience" }
- inputText: "busy professionals"
- tapOn: { id: "onboard.aboutContinue" }
- tapOn: { id: "onboard.knownForSkip" }
- tapOn: { id: "onboard.platform.instagram" }
- extendedWaitUntil: { visible: "A few quick questions", timeout: 4000 }
- tapOn: { id: "onboard.interview.skip" }
- tapOn: { id: "onboard.voiceContinue" }
- extendedWaitUntil: { visible: "Who do you want to sound like?", timeout: 4000 }
- takeScreenshot: /Users/home/Marque/.shots/emulate-recheck
- tapOn: { id: "onboard.emulate.custom" }
- extendedWaitUntil: { visible: { id: "onboard.emulate.handle" }, timeout: 4000 }
- tapOn: { id: "onboard.emulate.handle" }
- inputText: "asdkjaslkdjaslkdjxyznonexistent999"
- tapOn: { point: "50%,20%" }
- tapOn: { id: "onboard.emulate.add" }
- extendedWaitUntil: { visible: "Couldn't find", timeout: 10000 }
- takeScreenshot: /Users/home/Marque/.shots/emulate-verify-fail
