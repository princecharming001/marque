appId: com.getmarque.app
name: Steal-these reel preview plays against PROD (no backend override)
---
- launchApp:
    arguments:
      demoHome: 1
- tapOn:
    id: "tour.skip"
    optional: true
- extendedWaitUntil:
    visible:
      id: "home.voiceBubble"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "feed.reel"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "feed.reel"
    index: 0
- extendedWaitUntil:
    visible: "Why it's working"
    timeout: 8000
# let the AVPlayer attach + first frames render
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/r5-reel-prod
- scrollUntilVisible:
    element: "Transcript"
    direction: DOWN
    timeout: 6000
    optional: true
- takeScreenshot: /tmp/r5-reel-transcript
