appId: com.marque.app
name: Marque — extra screens (assumes onboarded)
---
- launchApp
# Brand Profile (editable Brand Graph)
- tapOn:
    id: "today.profile"
- assertVisible: "What Marque knows about you"
- tapOn:
    id: "profile.knownFor"
- inputText: " — refined"
- tapOn: "Done"
- assertVisible: "Today"
# Insights (from Coach)
- tapOn: "Coach"
- tapOn:
    id: "coach.insights"
- assertVisible: "Insights"
- tapOn: "Done"
# Schedule a clip onto the week, then see it as "Next up" on Today
- tapOn: "Calendar"
- tapOn:
    id: "calendar.addClip"
- assertVisible: "Pick a clip"
- tapOn:
    id: "schedule.pickClip"
- extendedWaitUntil:
    visible: "This week"
    timeout: 6000
- tapOn: "Today"
- assertVisible: "Next up"
# Studio pillar regenerate (taps a pillar node -> triggers generation, same path as the AHA)
- tapOn: "Studio"
- tapOn:
    id: "studio.pillar.Lessons"
- assertVisible: "Your pillars"
