appId: com.marque.app
name: Marque — extra screens (assumes onboarded)
---
- launchApp
# You tab — Brand identity editor
- tapOn: "You"
- assertVisible: "Brand identity"
- tapOn: "Brand identity"
- tapOn:
    id: "profile.knownFor"
- inputText: " — refined"
- tapOn: "Save"
- assertVisible: "You"
# Queue tab is reachable (was Calendar)
- tapOn: "Queue"
- assertVisible: "YOUR SCHEDULE"
- tapOn: "Today"
# Settings reachable via You → gear
- tapOn: "You"
- tapOn:
    id: "you.settings"
- assertVisible: "Settings"
- tapOn: "Done"
# Studio pillar regenerate (taps a pillar node -> triggers generation, same path as the AHA)
- tapOn: "Studio"
- tapOn:
    id: "studio.pillar.Myth-busting"
- tapOn:
    id: "pick.talking_head"
- assertVisible: "Your pillars"
# Hook Lab (pick a hook) + steer
- tapOn:
    id: "studio.scriptRow"
- tapOn:
    id: "studio.openScript"
- assertVisible: "Shot plan"
- tapOn:
    id: "script.hookButton"
- extendedWaitUntil:
    visible: "Pick your hook"
    timeout: 6000
- tapOn:
    id: "hooklab.pickHook"
- extendedWaitUntil:
    visible: "Shot plan"
    timeout: 6000
- waitForAnimationToEnd:
    timeout: 3000
- swipe:
    start: "50%, 60%"
    end: "50%, 20%"
    duration: 300
- swipe:
    start: "50%, 60%"
    end: "50%, 20%"
    duration: 300
- assertVisible: "Refine"
- tapOn:
    id: "script.steer"
- extendedWaitUntil:
    visible: "Refine"
    timeout: 8000
