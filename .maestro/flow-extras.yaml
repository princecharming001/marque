appId: com.marque.app
name: Marque — extra screens (assumes onboarded)
---
- launchApp
# Brand Profile (editable Brand Graph)
- tapOn:
    id: "today.profile"
- assertVisible: "What Marque knows about you"
- tapOn:
    id: "profile.knownFor"
- inputText: " — refined"
- tapOn: "Done"
- assertVisible: "Today"
# Insights (from Coach)
- tapOn: "Coach"
- tapOn:
    id: "coach.insights"
- assertVisible: "Insights"
- tapOn: "Done"
