appId: com.marque.app
name: Marque — extra screens (assumes onboarded)
---
- launchApp
# Brand Profile (editable Brand Graph)
- tapOn:
    id: "today.profile"
- assertVisible: "Your Profile"
- tapOn:
    id: "profile.knownFor"
- inputText: " — refined"
- tapOn: "Done"
- assertVisible: "Today"
# Insights (from Coach)
- tapOn: "Coach"
- tapOn:
    id: "coach.insights"
- assertVisible: "Insights"
- tapOn: "Done"
# Schedule a clip onto the week, then see it as "Next up" on Today
- tapOn: "Calendar"
- tapOn:
    id: "calendar.addClip"
- assertVisible: "Pick a clip"
- scrollUntilVisible:
    element:
      id: "schedule.pickClip"
    direction: DOWN
    timeout: 8000
- tapOn:
    id: "schedule.pickClip"
- tapOn: "Today"
- scrollUntilVisible:
    element:
      text: "Next up"
    direction: DOWN
    timeout: 6000
# Studio pillar regenerate (taps a pillar node -> triggers generation, same path as the AHA)
- tapOn: "Studio"
- tapOn:
    id: "studio.pillar.Myth-busting"
- tapOn:
    id: "pick.talking_head"
- assertVisible: "Your pillars"
# Hook Lab (pick a hook) + steer
- tapOn:
    id: "studio.scriptRow"
- tapOn:
    id: "studio.openScript"
- assertVisible: "Shot plan"
- tapOn:
    id: "script.hookButton"
- assertVisible: "Pick your hook"
- tapOn:
    id: "hooklab.pickHook"
- assertVisible: "Shot plan"
- scrollUntilVisible:
    element:
      id: "script.steer"
    direction: DOWN
    timeout: 8000
- tapOn:
    id: "script.steer"
- assertVisible: "Refine"
