appId: com.getmarque.app
name: Marque — extra screens (assumes flow-full already ran — onboarded, authed, subscribed)
---
- launchApp
# launchApp (no reset) may relaunch the process fresh (StoreKit entitlement state
# is process-scoped and not guaranteed to persist) — handle landing on the paywall.
- tapOn:
    id: "paywall.devContinue"
    optional: true
# flow-full may also have left the router on a different tab (e.g. Chat) from a
# resumed process — land on Home explicitly either way.
- tapOn: "Home"
- assertVisible:
    id: "home.voiceBubble"

# Profile — pushed from Home's avatar button
- tapOn:
    id: "home.profile"
- assertVisible: "Brand identity"
- tapOn: "Brand identity"
- tapOn:
    id: "profile.knownFor"
- inputText: " — refined"
- tapOn: "Save"
- assertVisible: "Profile"

# Creators to watch — add a slot
- scrollUntilVisible:
    element:
      id: "profile.addCreator0"
    direction: DOWN
- tapOn:
    id: "profile.addCreator0"
- tapOn:
    id: "profile.watchCreator0"
- inputText: "bigcoach"
- tapOn:
    id: "profile.saveCreator0"

# Settings reachable via the gear
- tapOn:
    id: "profile.settings"
- assertVisible: "Settings"
- tapOn:
    id: "settings.autoCaptions"
- tapOn:
    id: "settings.captionStyle"
- tapOn:
    id: "settings.fillerTrim"
- tapOn: "Done"

# Chat tab — send a message, expect a reply + suggested chips
- tapOn: "Chat"
- assertVisible: "What can I help with?"
- tapOn:
    id: "chat.composer"
- inputText: "Write me a script about morning routines"
- tapOn:
    id: "chat.send"
- extendedWaitUntil:
    visible:
      id: "chat.save"
    timeout: 20000
# Dismiss the keyboard by tapping the header wordmark — a fixed, always-blank
# spot regardless of reply content height (a fixed-point/message tap is
# fragile: script cards and chips vary in height and a tap can land on a
# button underneath instead of clearing focus). Also avoids Maestro's
# hideKeyboard command, which is unstable with this XCUITest driver setup.
- tapOn: "Marque"

# Home reel → mimic flow
- tapOn: "Home"
- extendedWaitUntil:
    visible:
      id: "feed.reel"
    timeout: 10000
- tapOn:
    id: "feed.reel"
    index: 0
- extendedWaitUntil:
    visible:
      id: "reel.mimic"
    timeout: 6000
- tapOn:
    id: "reel.mimic"
- extendedWaitUntil:
    visible:
      id: "reel.saveMimic"
    timeout: 20000
- tapOn:
    id: "reel.saveMimic"

# Film flow: Hook Lab + steer on a readied script (reuses ScriptReaderView unchanged)
- tapOn:
    id: "film.open"
- extendedWaitUntil:
    visible:
      id: "film.readied"
    timeout: 6000
- tapOn:
    id: "film.readied"
    index: 0
- assertVisible: "Shot plan"
- tapOn:
    id: "script.hookButton"
- extendedWaitUntil:
    visible: "Pick your hook"
    timeout: 6000
- tapOn:
    id: "hooklab.pickHook"
- extendedWaitUntil:
    visible: "Shot plan"
    timeout: 6000
- waitForAnimationToEnd:
    timeout: 3000
- swipe:
    start: "50%, 60%"
    end: "50%, 20%"
    duration: 300
- swipe:
    start: "50%, 60%"
    end: "50%, 20%"
    duration: 300
- assertVisible: "Refine"
- tapOn:
    id: "script.steer"
- extendedWaitUntil:
    visible: "Refine"
    timeout: 8000

# Manual editor (E18): open a finished clip → Edit manually → cut a segment → Apply.
# Assumes flow-full already produced clips (mock jobs keep their edit session alive).
- tapOn: "Library"
- extendedWaitUntil:
    visible: "YOUR CREATIVE VAULT"
    timeout: 6000
- extendedWaitUntil:
    visible: "READY"
    timeout: 8000
- tapOn: "READY"
- extendedWaitUntil:
    visible:
      id: "clip.editManual"
    timeout: 6000
- tapOn:
    id: "clip.editManual"
- extendedWaitUntil:
    visible: "Segments"
    timeout: 6000
- tapOn:
    id: "editor.cut"
    index: 0
- tapOn:
    id: "editor.apply"
# Mock path: applied in place (no render) → editor dismisses back to the clip.
- extendedWaitUntil:
    visible:
      id: "clip.editManual"
    timeout: 10000
