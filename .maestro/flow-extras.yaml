appId: com.marque.app
name: Marque — extra screens (assumes onboarded)
---
- launchApp
# Brand Profile (editable Brand Graph)
- tapOn:
    id: "today.profile"
- assertVisible: "Your Profile"
- tapOn:
    id: "profile.knownFor"
- inputText: " — refined"
- tapOn: "Done"
- assertVisible: "Today"
# Insights (from Coach)
- tapOn: "Coach"
- tapOn:
    id: "coach.insights"
- assertVisible: "Insights"
- tapOn: "Done"
# Calendar tab is reachable
- tapOn: "Calendar"
- assertVisible: "calendar"
- tapOn: "Today"
# Studio pillar regenerate (taps a pillar node -> triggers generation, same path as the AHA)
- tapOn: "Studio"
- tapOn:
    id: "studio.pillar.Myth-busting"
- tapOn:
    id: "pick.talking_head"
- assertVisible: "Your pillars"
# Hook Lab (pick a hook) + steer
- tapOn:
    id: "studio.scriptRow"
- tapOn:
    id: "studio.openScript"
- assertVisible: "Shot plan"
- tapOn:
    id: "script.hookButton"
- extendedWaitUntil:
    visible: "Pick your hook"
    timeout: 6000
- tapOn:
    id: "hooklab.pickHook"
- extendedWaitUntil:
    visible: "Shot plan"
    timeout: 6000
- waitForAnimationToEnd:
    timeout: 3000
# scrollUntilVisible's auto-swipe doesn't reliably reach content past the pinned bottom CTA on
# this screen — a manual swipe within the card area (staying clear of the pinned button) does.
- swipe:
    start: "50%, 60%"
    end: "50%, 20%"
    duration: 300
- swipe:
    start: "50%, 60%"
    end: "50%, 20%"
    duration: 300
- assertVisible: "Refine"
- tapOn:
    id: "script.steer"
- extendedWaitUntil:
    visible: "Refine"
    timeout: 8000
